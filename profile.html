<!doctype html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="styles/profile.css" />
</head>
<body>
    <header>
        <div>
            <a class="logo" href="./index.html">MOVIEFLIX</a>
            <nav>
                <a href="./index.html">Home</a>
                <a href="./tvshows.html">TV Shows</a>
                <a href="./movies.html">Movies</a>
                <a href="./newreleases.html">New & Popular</a>
                <a href="./profile.html">My List</a>
            </nav>
        </div>

        <div>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-search"
                viewBox="0 0 16 16">
                <path
                    d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
            </svg>
            <span class="profile">U</span>
        </div>
    </header>
    <main>
        <section>
            <!--användarens namn, profildata, statistik etc-->
            <div class="user-container">
                <div class="user-profile">
                    <div class="profile-image"></div>
                    <div>
                        <h1>
                            Milo Söderberg
                            <a href="#"
                                ><svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24"
                                    width="24"
                                    height="24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linejoin="round">
                                    <g transform="translate(12,12) rotate(45)">
                                        <!-- body -->
                                        <rect
                                            x="-4"
                                            y="-12"
                                            width="8"
                                            height="16"
                                            rx="1" />
                                        <!-- wood tip -->
                                        <rect
                                            x="-4"
                                            y="4"
                                            width="8"
                                            height="4" />
                                        <!-- graphite tip -->
                                        <polygon points="-4,8 4,8 0,14" />
                                        <!-- ferrule -->
                                        <rect
                                            x="-4"
                                            y="-14"
                                            width="8"
                                            height="3" />
                                        <!-- eraser -->
                                        <rect
                                            x="-4"
                                            y="-18"
                                            width="8"
                                            height="5"
                                            rx="1" />
                                    </g>
                                </svg>
                            </a>
                        </h1>
                        <p>milo.soderberg@fejkmejl.se</p>
                    </div>
                </div>
            </div>
            <div class="stats-container">
                <div>
                    <h3>Member Since</h3>
                    <p>March 2026</p>
                </div>
                <div>
                    <h3>Movies Watched</h3>
                    <p>24</p>
                </div>
                <div>
                    <h3>Average Rating</h3>
                    <p class="rating">
                        4.3
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 100 100"
                            width="20"
                            height="20">
                            <polygon
                                points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
                                fill="#F5A623"
                                stroke="#E8940F"
                                stroke-width="1.5" />
                        </svg>
                    </p>
                </div>
            </div>
            <div>
                <h3>Favorite Genres</h3>
                <div class="genre-container">
                    <p class="genre">Action</p>
                    <p>Comedy</p>
                    <p>Animation</p>
                </div>
            </div>
        </section>
        <section>
            <h2 class="favorites-header">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linejoin="round">
                    <path
                        d="M12,21 C10,19 2,14 2,8 C2,4 5,2 8,3 C10,4 11,6 12,8 C13,6 14,4 16,3 C19,2 22,4 22,8 C22,14 14,19 12,21 Z" />
                </svg>
                Favorite Movies
            </h2>
            <div class="temporary-container">
                <div class="temporary-card"></div>
                <div class="temporary-card"></div>
                <div class="temporary-card"></div>
            </div>
        </section>
        <section>
            <h2>
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linejoin="round"
                    stroke-linecap="round">
                    <g transform="translate(12,12) rotate(45)">
                        <!-- top flange -->
                        <rect x="-5" y="-9" width="10" height="3" rx="1" />
                        <!-- spool body -->
                        <rect x="-2.5" y="-6" width="5" height="7" rx="0.5" />
                        <!-- bottom flange -->
                        <rect x="-5" y="1" width="10" height="3" rx="1" />
                        <!-- needle -->
                        <line x1="0" y1="4" x2="0" y2="14" />
                    </g>
                </svg>
                My list
            </h2>
            <div class="temporary-container">
                <div class="temporary-card"></div>
                <div class="temporary-card"></div>
                <div class="temporary-card"></div>
            </div>
        </section>
    </main>
    <footer>
        <!--fylls i senare-->
    </footer>
</body>
